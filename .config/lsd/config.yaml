# Ref: https://github.com/Peltoche/lsd

# Use ls config instead of lsd config.
classic: false

color:
  when: auto
  theme: custom # Uses colors.yaml


date: "+%Y-%m-%d %H:%M"

icons:
  when: auto
  theme: fancy
  separator: " "

# Keep noisy entries hidden so large/project-root listings stay focused and faster to scan.
# ignore-globs:
#   - .git
#   - .DS_Store
#   - node_modules


# Use compact size units to reduce column width and improve long-list readability.
# size: short

# Enable clickable paths in modern terminals to speed up navigation from listings.
# hyperlink: auto

# Show headers in long mode so column meaning stays obvious at a glance.
#header: true

sorting:
  column: name
  reverse: false
  # Keep directories above files to reduce scrolling and improve directory-first workflows.
  dir-grouping: first

# Keep symlink targets visible so linked destinations remain obvious.
no-symlink: false

# Whether to display the total size of directories.
total-size: false

# Keep long format stable so key metadata appears in a predictable left-to-right order.
blocks:
  - permission
  - user
  - group
  - size
  - date
  - name
