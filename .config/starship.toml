# Starship prompt configuration
# Ref: https://starship.rs/config/
# NOTE configured symbols comes from Nerd Font one of which must be used in the terminal.
# Modeline {{
#	vi: foldmarker={{,}} filetype=toml foldmethod=marker foldlevel=0 tabstop=4 shiftwidth=4:
# }}

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Options {{
# Insert newline between last command output and new prompt.
add_newline = true

# Timeout for commands run by starship. Default: 500
command_timeout = 600

# Modules in the prompt line(s):
# Right-side modules shown inline via $fill trick (aligns status/duration/jobs to the right).
format = """
$hostname\
$os\
$directory\
$git_branch\
$git_status\
$git_state\
$fill\
$status\
$cmd_duration\
$jobs\
$direnv\
$python\
$nodejs\
$ruby\
$golang\
$java\
$rust\
$time\
$line_break\
$character"""


# }}

# {{ Left prompt modules
[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold dimmed white"

[os]
disabled = false
format = "[$symbol]($style) "
style = "bold white"

[os.symbols]
# Default symbols at https://starship.rs/config/#options-70
Macos = ""
Linux = ""
Windows = ""

[directory]
# Keep 1 dir component per truncated level.
truncation_length = 5
# truncate_to_repo = false      # Show full path even inside git repos.
truncation_symbol = "…/"
style = "bold cyan"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"

[git_status]
# Ref: https://starship.rs/config/#git-status
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
# Keep it simple, leave out-commented.
#conflicted = "="
#ahead = "⇡${count}"
#behind = "⇣${count}"
#diverged = "⇕⇡${ahead_count}⇣${behind_count}"
#untracked = "?${count}"
#stashed = "\uf187${count}"
#modified = "!${count}"
#staged = "+${count}"
#renamed = "»${count}"
#deleted = "✘${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold red"

[fill]
# Fill until right prompt.
symbol = " "
# }}

# {{ Right prompt modules
[status]
# Show non-zero exit codes
disabled = false
format = "[$symbol$status]($style) "
symbol = ""
style = "bold red"

[cmd_duration]
# Only show for commands that took longer than 3s
min_time = 3_000
format = "[ $duration]($style) "
style = "bold yellow"

[jobs]
# Show background job count when ≥1
symbol = ""
format = "[$symbol$number]($style) "
style = "bold blue"
number_threshold = 1
symbol_threshold = 1

[direnv]
# Show when a .envrc is loaded/blocked
disabled = false
format = "[$symbol$allowed]($style) "
symbol = " "
style = "bold orange"
allowed_msg = ""
denied_msg = "blocked"
not_allowed_msg = ""

# {{ Language / runtime modules
# Each only shows when a relevant project file is detected in the current directory.
[python]
format = "[${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
symbol = " "
style = "bold yellow"

[nodejs]
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold green"

[ruby]
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold red"

[golang]
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold cyan"

[java]
disabled = true
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold red"

[rust]
disabled = true
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold orange"
# }}

[time]
disabled = false
format = "[ $time]($style) "
time_format = "%H:%M"
style = "bold dimmed white"
# }}

# Command line {{
# ── Language / runtime modules ───────────────────────────────────────────────
[character]
# ❯ in insert mode (green=ok, red=error), ❮ in vi normal mode.
#success_symbol = "[❯](bold green)"
#error_symbol = "[❯](bold red)"

# $ in insert mode (green=ok, red=error), ❮ in vi normal mode.
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"
vimcmd_symbol = "[\\$](bold fg:#d78700)"
vimcmd_replace_one_symbol = "[▶](bold purple)"
vimcmd_replace_symbol = "[▶](bold purple)"
vimcmd_visual_symbol = "[V](bold yellow)"
# }}
