# Starship prompt configuration
# Ref: https://starship.rs/config/
# NOTE configured symbols comes from Nerd Font one of which must be used in the terminal.
# Modeline {{
#	vi: foldmarker={{,}} filetype=toml foldmethod=marker foldlevel=0 tabstop=4 shiftwidth=4:
# }}

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Options {{
# Insert newline between last command output and new prompt.
add_newline = true

# Timeout for commands run by starship. Default: 500
command_timeout = 600

# Modules in the prompt line(s):
# Right-side modules shown inline via $fill trick (aligns status/duration/jobs to the right).
format = """
$os\
$directory\
$git_branch\
$git_status\
$fill\
$status\
$cmd_duration\
$jobs\
$direnv\
$python\
$nodejs\
$ruby\
$golang\
$java\
$rust\
$line_break\
$character"""


# }}

# {{ Left prompt modules
[os]
disabled = false
format = "[$symbol]($style) "
style = "bold white"

[os.symbols]
Macos = "п…№"
Linux = "п…ј"
Windows = "п…ә"

[directory]
# Keep 1 dir component per truncated level.
truncation_length = 5
truncate_to_repo = false      # Show full path even inside git repos.
truncation_symbol = "вҖҰ/"
style = "bold cyan"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = "оӮ  "
style = "bold purple"

[git_status]
# Ref: https://starship.rs/config/#git-status
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
#conflicted = "="
#ahead = "вҮЎ${count}"
#behind = "вҮЈ${count}"
#diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
#untracked = "?${count}"
#stashed = "\uf187${count}"
#modified = "!${count}"
#staged = "+${count}"
#renamed = "В»${count}"
#deleted = "вңҳ${count}"

[fill]
# Fill until right prompt.
symbol = " "
# }}

# {{ Right prompt modules
[status]
# Show non-zero exit codes
disabled = false
format = "[$symbol$status]($style) "
symbol = "пҖҚ"
style = "bold red"

[cmd_duration]
# Only show for commands that took longer than 3s
min_time = 3_000
format = "[пҖ— $duration]($style) "
style = "bold yellow"

[jobs]
# Show background job count when вүҘ1
symbol = "пҖ“"
format = "[$symbol$number]($style) "
style = "bold blue"
number_threshold = 1
symbol_threshold = 1

[direnv]
# Show when a .envrc is loaded/blocked
disabled = false
format = "[$symbol$allowed]($style) "
symbol = "п‘ў "
style = "bold orange"
allowed_msg = ""
denied_msg = "blocked"
not_allowed_msg = ""

# {{ Language / runtime modules
# Each only shows when a relevant project file is detected in the current directory.
[python]
format = "[${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
symbol = "оҳҶ "
style = "bold yellow"

[nodejs]
format = "[$symbol($version )]($style)"
symbol = "оңҳ "
style = "bold green"

[ruby]
format = "[$symbol($version )]($style)"
symbol = "оң№ "
style = "bold red"

[golang]
format = "[$symbol($version )]($style)"
symbol = "оҳҰ "
style = "bold cyan"

[java]
format = "[$symbol($version )]($style)"
symbol = "оңё "
style = "bold red"
disabled = true   # Enable if you regularly work in Java projects.

[rust]
format = "[$symbol($version )]($style)"
symbol = "оһЁ "
style = "bold orange"
disabled = true   # Enable if you regularly work in Rust projects.
# }}
# }}

# Command line {{
# в”Җв”Җ Language / runtime modules в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
# вқҜ in insert mode (green=ok, red=error), вқ® in vi normal mode.
#success_symbol = "[вқҜ](bold green)"
#error_symbol = "[вқҜ](bold red)"

# $ in insert mode (green=ok, red=error), вқ® in vi normal mode.
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"
vimcmd_symbol = "[вқ®](bold green)"
vimcmd_replace_one_symbol = "[в–¶](bold purple)"
vimcmd_replace_symbol = "[в–¶](bold purple)"
vimcmd_visual_symbol = "[V](bold yellow)"
# }}
